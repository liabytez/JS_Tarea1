<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 2</title>
</head>

<body>
    <section>
        <p id="texto">Lorem ipsum dolor sit amet consectetur adipisicing elit. Cupiditate ducimus cumque distinctio
            nesciunt nam id, temporibus quae quod perferendis delectus maiores. Velit necessitatibus fugiat vel veniam
            rem quibusdam tenetur aliquam.</p>
        <button id="btn">Clic</button>
    </section>

    <script>
        const boton = document.getElementById("btn")
        const parrafo = document.getElementById("texto")

        boton.addEventListener("click", function () {
            parrafo.style.color = "red"
        })
    </script>
</body>

</html>
